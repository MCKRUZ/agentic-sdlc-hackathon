<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>M01: The Agentic Mental Shift</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1920px; height: 1080px;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0D0D0F;
      color: #FFFFFF;
      overflow: hidden;
      position: relative;
    }
    .hl { color: #FFE600; font-weight: 600; }

    /* Large module number background */
    .module-bg-number {
      position: absolute;
      top: -60px;
      right: 60px;
      font-size: 480px;
      font-weight: 900;
      color: rgba(255,230,0,0.04);
      line-height: 1;
      user-select: none;
      pointer-events: none;
      letter-spacing: -20px;
    }

    /* Diagonal accent bar */
    .diagonal-accent {
      position: absolute;
      left: 80px;
      top: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .accent-bar {
      width: 6px;
      height: 120px;
      background: #FFE600;
      transform: skewY(-20deg);
      border-radius: 3px;
    }
    .accent-dot {
      width: 6px;
      height: 6px;
      background: rgba(255,230,0,0.4);
      border-radius: 50%;
    }

    .content {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 140px 80px 140px;
    }

    .module-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 24px;
    }

    .module-number {
      font-size: 200px;
      font-weight: 900;
      color: #FFE600;
      line-height: 0.85;
      letter-spacing: -8px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1.05;
      margin-bottom: 28px;
      max-width: 900px;
    }

    .subtitle {
      font-size: 22px;
      font-weight: 400;
      color: rgba(255,255,255,0.6);
      max-width: 700px;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .time-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 100px;
      border: 1px solid rgba(255,230,0,0.4);
      background: rgba(255,230,0,0.06);
    }
    .time-badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #FFE600;
    }
    .time-badge-text {
      font-size: 14px;
      font-weight: 600;
      color: #FFE600;
      letter-spacing: 1px;
    }

    footer {
      position: absolute;
      bottom: 40px;
      left: 100px;
      right: 100px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-text {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
    }
    .footer-logo img { height: 24px; width: auto; }
  </style>
</head>
<body>
  <div class="module-bg-number">01</div>

  <div class="diagonal-accent">
    <div class="accent-dot"></div>
    <div class="accent-bar"></div>
    <div class="accent-dot"></div>
  </div>

  <div class="content">
    <div class="module-label">Module One</div>
    <div class="module-number">01</div>
    <h1>The Agentic Mental Shift</h1>
    <div class="subtitle">Understanding what these tools actually are — and aren't</div>
    <div class="time-badge">
      <div class="time-badge-dot"></div>
      <div class="time-badge-text">30 min</div>
    </div>
  </div>

  <footer>
    <div class="footer-text">Agentic SDLC Hackathon</div>
    <div class="footer-logo"><img src="ey-logo-dark.png" alt="EY" /></div>
    <div class="footer-text">03</div>
  </footer>
</body>
</html>
